compression:
  # Which compressor to use for stored KV/hidden states
  method: "none"  # "none" | "fp16" | "int8" | "int4" | "turboquant_like"

  # INT8 settings
  int8:
    symmetric: true

  # INT4 / groupwise settings
  int4:
    group_size: 128
    symmetric: true

  # TurboQuant-inspired settings
  turboquant_like:
    rotation: "random_orthogonal"  # "random_orthogonal" | "hadamard"
    bits: 4
    group_size: 128
    seed: 42  # for reproducible rotation matrix
    residual_correction: false  # future: optional residual path for keys
