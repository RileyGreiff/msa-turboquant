compression:
  # Which compressor to use for stored KV/hidden states
  method: "none"  # "none" | "fp16" | "int8" | "int4" | "turboquant_mse"

  # INT8 settings
  int8:
    symmetric: true

  # INT4 / groupwise settings
  int4:
    group_size: 128
    symmetric: true

  # TurboQuant MSE settings (Lloyd-Max codebook quantization)
  turboquant_mse:
    rotation: "random_orthogonal"  # "random_orthogonal" | "hadamard"
    bits: 4
    seed: 42  # for reproducible rotation matrix
